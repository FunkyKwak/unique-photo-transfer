name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ExifTool
        run: |
            mkdir tools\exiftool

            Invoke-WebRequest `
            -Uri "https://sourceforge.net/projects/exiftool/files/exiftool-13.59_64.zip/download" `
            -OutFile "exiftool.zip"

            Expand-Archive `
            -Path "exiftool.zip" `
            -DestinationPath "tools\exiftool"

            copy tools\exiftool\exiftool(-k).exe tools\exiftool\exiftool.exe
                    
      - name: Build executable
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --icon assets/unique-photo-transfer.ico `
            --add-data "assets;assets" `
            --add-binary "tools\exiftool\exiftool.exe;tools\exiftool" `
            --onefile `
            --name "Unique_Photo_Transfer" `
            main.py

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/Unique_Photo_Transfer.exe"
          generateReleaseNotes: true